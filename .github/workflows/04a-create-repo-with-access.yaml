name: Create BBB-2 Repository

on:
  workflow_dispatch:
    inputs:
      visibility:
        description: 'Repository visibility'
        required: true
        default: 'private'
        type: choice
        options:
          - private
          - public

jobs:
  create-new-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create new repository in ORG-JEDAN
        env:
          GH_TOKEN: ${{ secrets.CREATE_REPO_PAT }}
        run: |
          gh repo create ORG-JEDAN/BBB-2 \
            --${{ github.event.inputs.visibility }} \
            --description "Repository created automatically from EOL"

          echo "Repository ORG-JEDAN/BBB-2 created successfully!"

      - name: Grant PAT owner admin access
        env:
          GH_TOKEN: ${{ secrets.CREATE_REPO_PAT }}
        run: |
          PAT_OWNER=$(gh api user --jq '.login')

          echo "Granting admin access to $PAT_OWNER"

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            /repos/ORG-JEDAN/BBB-2/collaborators/$PAT_OWNER \
            -f permission=admin

          echo "$PAT_OWNER now has admin access to ORG-JEDAN/BBB-2"
